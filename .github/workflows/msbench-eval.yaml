name: MSBench SDK Skills Evaluation

# Manual entrypoint for running the MSBench SDK skills evaluation pipeline.
on:
  workflow_dispatch:
    inputs:
      benchmark:
        description: 'Benchmark name'
        default: 'cosmos-sdk-skills'
      repeat:
        description: 'Number of independent attempts per instance'
        default: '3'
      threshold:
        description: 'Pass rate threshold (0-1)'
        default: '0.9'
      model:
        description: 'Model to use'
        required: false
        default: 'claude-opus-4-8'

jobs:
  evaluate:
    name: Run MSBench evaluation
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for Azure OIDC / federated credentials login.
      issues: write # Required if the evaluation fails and an issue must be created.
      contents: read

    steps:
      # Check out the repository so the evaluation and issue scripts are available.
      - name: Check out repository
        uses: actions/checkout@v4

      # Authenticate to Azure using GitHub OIDC. The referenced secrets must be configured
      # in the repository or organization: AZURE_CLIENT_ID, AZURE_TENANT_ID,
      # and AZURE_SUBSCRIPTION_ID.
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Use Python 3.11 for the MSBench tooling and repository scripts.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install the MSBench CLI from the Azure Artifacts feed. The access token is passed
      # via environment variable to avoid persisting credentials in pip config.
      - name: Install msbench-cli
        run: |
          ACCESS_TOKEN=$(az account get-access-token --resource 499b84ac-1321-427f-aa17-267ca6975798 --query accessToken -o tsv)
          echo "::add-mask::$ACCESS_TOKEN"
          pip install msbench-cli \
            --extra-index-url "https://build:${ACCESS_TOKEN}@pkgs.dev.azure.com/devdiv/_packaging/MicrosoftSweBench/pypi/simple/" \
            --trusted-host pkgs.dev.azure.com

      # Run the evaluation script. The script is expected to exit with code 1 if the pass
      # threshold is not met, which will mark the job as failed and trigger the issue step below.
      - name: Run MSBench evaluation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/msbench-eval.py \
            --benchmark "${{ inputs.benchmark }}" \
            --repeat "${{ inputs.repeat }}" \
            --threshold "${{ inputs.threshold }}" \
            ${{ inputs.model && format('--model {0}', inputs.model) || '' }} \
            --output results.json

      # If the evaluation step fails and a results file was produced, create a GitHub issue
      # summarizing the results so the regression can be tracked.
      - name: Create issue if threshold not met
        if: failure() && hashFiles('results.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/create-skills-issue.py \
            --results-file results.json \
            --repo "${{ github.repository }}"

      # Always upload the results so they can be inspected even when the workflow fails.
      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msbench-results
          path: results.json
