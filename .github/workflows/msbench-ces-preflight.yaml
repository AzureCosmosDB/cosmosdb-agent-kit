name: MSBench CES Submit Preflight

# Lightweight check that the CI identity — the Azure service principal (SP) that
# GitHub Actions logs in as via OIDC — can actually reach CES and is entitled to
# submit a run. It submits a single run with --no-wait and asserts that CES returns
# a server-assigned run_id, then exits without polling or grading.
#
# Why this proves the SP path:
#   * The run_id is minted by CES only after it accepts the submission. So a returned
#     run_id proves the SP authenticated to CES AND cleared MSBench entitlement.
#   * No run_id means the submit was rejected upstream (auth, entitlement, or network),
#     and msbench-eval.py exits non-zero, failing this job with the CLI error.
#
# Use this before the full MSBench SDK Skills Evaluation to confirm the corp-side
# gates (SP entitlement + CES reachability from GitHub-hosted runners) are cleared,
# without paying for a full ~16-minute graded agent run.
#
# Note: --no-wait returns immediately after submission, but the submitted run still
# executes server-side once. That single run is the cost of proving the path.
on:
  workflow_dispatch:
    inputs:
      benchmark:
        description: 'Benchmark name'
        default: 'cosmos-sdk-skills'

jobs:
  preflight:
    name: CES submit preflight (service principal)
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for Azure OIDC / federated credentials login.
      contents: read

    steps:
      # Check out the repository so the runner script and eval driver are available.
      - name: Check out repository
        uses: actions/checkout@v4

      # Authenticate to Azure as the service principal using GitHub OIDC. This is the
      # exact identity a scheduled/published run would use — the whole point of the
      # preflight is to prove THIS identity can submit to CES. The referenced secrets
      # must be configured: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID.
      - name: Azure CLI Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Use Python 3.11 for the MSBench tooling and repository scripts.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install the MSBench CLI from the Azure Artifacts feed. The access token is passed
      # via environment variable to avoid persisting credentials in pip config.
      - name: Install msbench-cli
        run: |
          ACCESS_TOKEN=$(az account get-access-token --resource 499b84ac-1321-427f-aa17-267ca6975798 --query accessToken -o tsv)
          echo "::add-mask::$ACCESS_TOKEN"
          pip install msbench-cli \
            --extra-index-url "https://build:${ACCESS_TOKEN}@pkgs.dev.azure.com/devdiv/_packaging/MicrosoftSweBench/pypi/simple/" \
            --trusted-host pkgs.dev.azure.com

      # Submit exactly one run with --no-wait and assert CES returned a run_id. This
      # exercises the real submission path — including Key Vault encryption of the
      # forwarded env vars — using the SP's ambient Azure credentials.
      #
      # GITHUB_TOKEN / COSMOS are forwarded (encrypted) exactly as in the full eval so
      # the preflight tests the same submission payload. They are not what authorizes
      # the CES submit itself — that is the SP's Azure identity.
      - name: Submit CES preflight run (assert run_id)
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          COSMOS: ${{ secrets.COSMOS }}
        run: |
          python scripts/msbench-eval.py \
            --benchmark "${{ inputs.benchmark }}" \
            --repeat 1 \
            --no-wait
