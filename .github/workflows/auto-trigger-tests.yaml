# =============================================================================
# Auto-Trigger Test Iteration
# =============================================================================
# Bridges the gap where pull_request events don't fire for commits pushed by
# GitHub Apps (like Copilot coding agent). Uses pull_request_target which DOES
# fire for App-pushed commits.
#
# Calls test-iteration.yaml as a reusable workflow (workflow_call) so that the
# test results appear as a PR status check. This is critical: the Copilot
# coding agent monitors PR check status and auto-retries when CI fails.
# A workflow_dispatch would run as a separate workflow not linked to the PR,
# so Copilot would never see the failure.
#
# Security: pull_request_target runs the BASE branch version of this file,
# not the PR's version. The called workflow checks out the PR head ref.
# =============================================================================

name: Auto-Trigger Tests

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review]
    paths:
      - 'testing-v2/scenarios/*/iterations/**'

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  test:
    uses: ./.github/workflows/test-iteration.yaml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit
