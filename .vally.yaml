paths:
  skills: skills/
  evals: evals/
  results: results/
files:
  evalFile: eval.yaml
  taskGlob: tasks/*.yaml
  taskFileSuffix: .yaml
defaults:
  engine: mock
  model: claude-sonnet-4.6
  timeout: 300
  parallel: false
  workers: 4
  verbose: false
  sessionLog: false
cache:
  enabled: false
  dir: .vally-cache
server:
  port: 3000
  resultsDir: results/
dev:
  model: claude-sonnet-4-20250514
  target: medium-high
  maxIterations: 5
tokens:
  warningThreshold: 500
  fallbackLimit: 1000
graders:
  programTimeout: 30
storage:
  containerName: vally-results