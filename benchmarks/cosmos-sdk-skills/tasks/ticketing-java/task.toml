version = "1.0"

[metadata]
author_name = "cosmos-sdk-skills-bench"
author_email = "noreply@example.com"
difficulty = "medium"
category = "skills-compliance"
tags = ["cosmos-db", "java", "sdk-best-practices", "azure", "event-ticketing"]

[verifier]
# 900s allows: emulator start (~30-90s) + agent build/install + app startup + ~40 pytest checks.
timeout_sec = 900.0

[agent]
# 1 hour for the agent to author 4 endpoints + Cosmos modelling.
timeout_sec = 3600.0

[environment]
build_timeout_sec = 1800.0
cpus = 4
memory = "8G"
storage = "20G"