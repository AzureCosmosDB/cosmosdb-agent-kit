# harbor-format-curation configuration for cosmos-sdk-skills benchmark.
# See the internal MSBench "Adding a Benchmark to MSBench" guide.

[import]
from = "path"
# Points to the directory containing ONLY task folders (each with task.toml).
path = "./tasks"
staging-folder = "${TEMP}/harborcuration/cosmos-sdk-skills"

[docker.local]
registry = "localhost:5000"
provider = "Docker localhost registry"
benchmark = "cosmos-sdk-skills"
type = "eval"
architecture = "x86_64"
version = "0.0.1"

# The [docker.prod] profile targets an internal Azure Container Registry and is NOT
# committed here to keep the registry name out of this public repo. CI appends it at
# publish time from the CES_ACR repo variable (see .github/workflows/publish-benchmark.yaml).
# To build/publish the prod profile locally, append a matching [docker.prod] section with
# registry = "<your-acr>.azurecr.io".
